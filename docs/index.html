<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волонтерство 5 вёрст Кстово</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, Helvetica Neue, Roboto, sans-serif; padding: 0; background: #f5f5f5; color: #333; margin: 0; padding-bottom: 30px; }
        .tabs { display: flex; background: #2B326D; position: sticky; top: 0; z-index: 1000; padding: 5px; gap: 5px; }
        .tab { flex: 1; text-align: center; padding: 12px; font-weight: bold; color: #fff; opacity: 0.6; cursor: pointer; border-radius: 8px; font-size: 14px; transition: 0.2s; }
        .tab.active { opacity: 1; background: rgba(255,255,255,0.15); }
        .card { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin: 15px; }
        h2 { color: #2B326D; font-size: 18px; margin-top: 0; margin-bottom: 12px; border-bottom: 2px solid #f0f2ff; padding-bottom: 8px; }
        .date-badge { color: #E6564C; font-weight: bold; }
        .welcome-msg { background: #f0f2ff; padding: 12px; border-radius: 10px; font-size: 13px; margin-bottom: 15px; color: #2B326D; display: none; border: 1px solid #dce1e6; line-height: 1.4; }
        label { font-size: 11px; color: #999; margin-left: 4px; font-weight: 600; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #dce1e6; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; background: #f9fafb; }
        button { width: 100%; padding: 14px; background: #E6564C; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #b0b0b0; }
        #search_results { background: white; border: 1px solid #dce1e6; border-radius: 8px; max-height: 250px; overflow-y: auto; display: none; position: absolute; width: 100%; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.1); top: 52px; }
        .search-item { padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .rating-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .rank { width: 30px; font-weight: 900; color: #2B326D; font-size: 16px; }
        .user-info { flex: 1; padding-left: 5px; }
        .user-name { font-weight: 700; font-size: 15px; color: #2B326D; display: block; }
        .stats-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 800; text-transform: uppercase; white-space: nowrap; color: #fff; display: flex; align-items: center; gap: 4px; }
        
        /* Цвета Клубов из палитры */
        .run10 { background: #fecc3f; color: #333; }
        .run25 { background: #f29104; }
        .run50 { background: #e6464c; }
        .run100, .run250, .run500 { background: #8c1f28; }
        
        .vol10 { background: #c9b4d8; color: #333; }
        .vol25 { background: #9d82aa; }
        .vol50 { background: #6c5391; }
        .vol100, .vol250, .vol500 { background: #422d58; }

        .volunteer-list { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        .role-tag { background: #f0f2ff; color: #2B326D; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
    </style>
</head>
<body>

<div class="tabs">
    <div id="tab_rec" class="tab active" onclick="switchTab('rec')">ЗАПИСЬ</div>
    <div id="tab_rate" class="tab" onclick="switchTab('rate')">РЕЙТИНГ</div>
</div>

<div id="section_rec">
    <div class="card">
        <h2>Записаться на <span id="event_date" class="date-badge">...</span></h2>
        <div id="welcome_back" class="welcome-msg"></div>
        <label>Кто записывается:</label>
        <div style="position:relative">
            <input type="text" id="verst_search" placeholder="Введите фамилию или ID..." autocomplete="off">
            <div id="search_results"></div>
        </div>
        <label>Позиция волонтера:</label>
        <select id="role_id" onchange="validateForm()">
            <option value="" disabled selected>Выберите роль из списка</option>
            <optgroup label="Основные позиции">
                <option value="1">Организатор</option>
                <option value="2">Секундомер</option>
                <option value="5">Фотограф</option>
                <option value="7">Маршал</option>
                <option value="8">Подготовка мероприятия</option>
                <option value="11">Сканирование штрих-кодов</option>
                <option value="13">Раздача карточек позиций</option>
                <option value="19">Замыкающий</option>
            </optgroup>
            <optgroup label="Дополнительные позиции">
                <option value="3">Сортировка карточек</option>
                <option value="4">Обработка результатов</option>
                <option value="6">Связи с общественностью</option>
                <option value="9">Хранение и доставка оборудования</option>
                <option value="10">Разное</option>
                <option value="12">Завершение мероприятия</option>
                <option value="14">Проверка карточек позиций</option>
                <option value="15">Инструктаж новых участников</option>
                <option value="16">Организация финиша</option>
                <option value="17">Ведущий велосипед</option>
                <option value="18">Помощь в раздаче карточек позиций</option>
                <option value="20">Координация волонтёров</option>
                <option value="23">Составление отчёта</option>
                <option value="28">Пейсмейкер</option>
                <option value="30">Лидер для слабовидящих</option>
                <option value="31">Проведение разминки</option>
                <option value="32">Сурдопереводчик</option>
                <option value="33">Координатор парковки</option>
                <option value="34">Проверка трассы</option>
                <option value="35">Разметка трассы</option>
                <option value="36">Ведущий мероприятия</option>
                <option value="37">Проведение предстартового брифинга</option>
                <option value="38">Видеограф</option>
            </optgroup>
        </select>
        <button id="submit_btn" onclick="sendData()" disabled>Выберите человека</button>
    </div>
    <div class="card">
        <h2>В списке на субботу</h2>
        <table class="volunteer-list" id="queue_table"><tbody></tbody></table>
    </div>
</div>

<div id="section_rate" style="display:none">
    <div class="card">
        <h2>Топ участников Кстово</h2>
        <div id="rating_list">Загрузка рейтинга...</div>
    </div>
</div>

<script>
    vkBridge.send("VKWebAppInit");
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-D2gRDsVAdJkK8W_8OKvHv0A3csFTzUIhqTa37Rd8V_mBISDEGDVexlMt6tE0LIhNBw/exec';
    
    let selectedVolunteer = null;
    let vkUser = null;

    function switchTab(t) {
        document.getElementById('section_rec').style.display = t === 'rec' ? 'block' : 'none';
        document.getElementById('section_rate').style.display = t === 'rate' ? 'block' : 'none';
        document.getElementById('tab_rec').classList.toggle('active', t === 'rec');
        document.getElementById('tab_rate').classList.toggle('active', t === 'rate');
        if (t === 'rate') loadRating();
    }

    async function init() {
        try {
            vkUser = await vkBridge.send("VKWebAppGetUserInfo");
            const res = await fetch(`${SCRIPT_URL}?check_vk_id=${vkUser.id}`);
            const data = await res.json();
            
            if (data.found) {
                selectedVolunteer = { id: data.verst_id, full_name: data.full_name };
                document.getElementById('verst_search').value = data.full_name;
                const welcome = document.getElementById('welcome_back');
                welcome.style.display = 'block';
                let txt = `👋 <b>${vkUser.first_name}</b>, твои данные подставлены!`;
                if (data.stats) {
                    txt += `<br><small>Твои результаты: 🏃 ${data.stats.runs} финишей | 🧡 ${data.stats.vols} волонтёрств</small>`;
                }
                welcome.innerHTML = txt;
                validateForm();
            }

            const dRes = await fetch(SCRIPT_URL + "?get_date=1");
            const dData = await dRes.json();
            document.getElementById('event_date').innerText = dData.date;
        } catch (e) { console.error(e); }
    }
    init();

    const searchInput = document.getElementById('verst_search');
    const resultsBox = document.getElementById('search_results');
    const submitBtn = document.getElementById('submit_btn');
    const roleSelect = document.getElementById('role_id');

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        if (query.length < 3) { resultsBox.style.display = 'none'; selectedVolunteer = null; validateForm(); return; }
        clearTimeout(window.searchTimeout);
        window.searchTimeout = setTimeout(() => fetchVolunteers(query), 500);
    });

    async function fetchVolunteers(query) {
        resultsBox.innerHTML = '<div style="padding:15px">Поиск...</div>';
        resultsBox.style.display = 'block';
        try {
            const res = await fetch(`${SCRIPT_URL}?search=${encodeURIComponent(query)}`);
            const data = await res.json();
            resultsBox.innerHTML = '';
            (data.result?.data || []).forEach(v => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `<b>${v.full_name}</b><br><small>ID: ${v.id} • Vols: ${v.volunteering_count}</small>`;
                div.onclick = () => {
                    selectedVolunteer = v;
                    searchInput.value = v.full_name;
                    resultsBox.style.display = 'none';
                    document.getElementById('welcome_back').style.display = 'none';
                    validateForm();
                };
                resultsBox.appendChild(div);
            });
        } catch (e) { resultsBox.innerHTML = 'Ошибка сети'; }
    }

    function validateForm() {
        submitBtn.disabled = !(selectedVolunteer && roleSelect.value);
        submitBtn.innerText = selectedVolunteer ? (roleSelect.value ? "Записаться волонтером" : "Выберите позицию") : "Выберите человека";
    }

    async function sendData() {
        submitBtn.innerText = "Записываем...";
        submitBtn.disabled = true;
        const payload = {
            verst_id: selectedVolunteer.id,
            role_id: roleSelect.value,
            role_name: roleSelect.options[roleSelect.selectedIndex].text,
            full_name: selectedVolunteer.full_name,
            vk_id: vkUser.id,
            vk_name: vkUser.first_name + " " + vkUser.last_name
        };
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Записано! Статистика обновится в рейтинге.");
        location.reload();
    }

    async function loadRating() {
        const container = document.getElementById('rating_list');
        container.innerHTML = 'Загрузка рейтинга...';
        try {
            const res = await fetch(`${SCRIPT_URL}?get_rating=1`);
            const data = await res.json();
            data.sort((a,b) => b.vols - a.vols);
            container.innerHTML = '';
            data.forEach((u, i) => {
                const item = document.createElement('div');
                item.className = 'rating-item';
                const rBadge = u.run_club ? `<span class="badge ${u.run_club}"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M13.49 5.42c1.23 0 2.22-1 2.22-2.22A2.22 2.22 0 0 0 13.5 1a2.22 2.22 0 0 0-2.23 2.22c0 1.22.99 2.2 2.22 2.2M10.34 11l-2.1-1.03c-.34-.17-.55-.52-.55-.91 0-.74.79-1.22 1.45-.91l4.83 2.3c.53.25.87.78.87 1.37V17h-2v-4.43l-1.74-.83V23h-2v-6.95l.45-1.5L7.2 13c-.34-.16-.55-.52-.55-.9 0-.75.8-1.23 1.46-.9l2.23 1.03V11z'/%3E%3C/svg%3E" width="12" style="margin-top:-2px" /%3E ${u.run_club.replace('run','') }</span>` : '';
                const vBadge = u.vol_club ? `<span class="badge ${u.vol_club}">🧡 ${u.vol_club.replace('vol','') }</span>` : '';
                item.innerHTML = `
                    <div class="rank">${i+1}</div>
                    <div class="user-info">
                        <span class="user-name">${u.name}</span>
                        <div class="stats-row">${rBadge} ${vBadge}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:900; color:#E6564C">${u.vols}</div>
                        <div style="font-size:10px; color:#999">волонтерств</div>
                        <div style="font-size:10px; color:#999; margin-top:2px">${u.runs} финишей</div>
                    </div>
                `;
                container.appendChild(item);
            });
        } catch (e) { container.innerHTML = 'Ошибка загрузки'; }
    }

    async function loadQueue() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const tbody = document.querySelector('#queue_table tbody');
            data.reverse().forEach(item => {
                let row = tbody.insertRow();
                row.insertCell(0).innerHTML = `<span class="role-tag">${item.role_name}</span>`;
                let nc = row.insertCell(1); nc.className = 'full-name-cell'; nc.innerText = item.full_name;
            });
        } catch(e) {}
    }
    loadQueue();
</script>
</body>
</html>
