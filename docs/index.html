<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волонтерство Кстово</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f5f5f5; color: #333; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #2B326D; font-size: 18px; margin-top: 0; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: #2B326D; }
        button { width: 100%; padding: 14px; background: #E6564C; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #search_wrapper { position: relative; }
        #search_results { background: white; border: 1px solid #ddd; border-radius: 8px; max-height: 250px; overflow-y: auto; display: none; position: absolute; width: 100%; z-index: 1000; box-shadow: 0 8px 24px rgba(0,0,0,0.15); margin-top: -5px; }
        .search-item { padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .search-item:hover { background: #f0f2ff; }
        .search-item b { color: #2B326D; display: block; font-size: 14px; }
        .search-item small { color: #666; font-size: 12px; }
        .loading-spinner { padding: 12px; text-align: center; color: #666; font-size: 13px; }
        .volunteer-list { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        .volunteer-list td { padding: 10px 8px; border-bottom: 1px solid #eee; }
        .role-tag { background: #f0f2ff; color: #2B326D; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <h2>Записаться на старт</h2>
    <div id="search_wrapper">
        <input type="text" id="verst_search" placeholder="Введите фамилию или ID..." autocomplete="off">
        <div id="search_results"></div>
    </div>
    
    <select id="role_id">
        <option value="" disabled selected>Выберите позицию</option>
        <optgroup label="Основные">
            <option value="1">Организатор</option>
            <option value="2">Секундомер</option>
            <option value="5">Фотограф</option>
            <option value="7">Маршал</option>
            <option value="8">Подготовка мероприятия</option>
            <option value="11">Сканирование штрих-кодов</option>
            <option value="13">Раздача карточек позиций</option>
            <option value="19">Замыкающий</option>
        </optgroup>
        <optgroup label="Дополнительные">
            <option value="3">Сортировка карточек</option>
            <option value="4">Обработка результатов</option>
            <option value="6">Связи с общественностью</option>
            <option value="9">Хранение и доставка оборудования</option>
            <option value="10">Разное</option>
            <option value="12">Завершение мероприятия</option>
            <option value="14">Проверка карточек позиций</option>
            <option value="15">Инструктаж новых участников</option>
            <option value="16">Организация финиша</option>
            <option value="17">Ведущий велосипед</option>
            <option value="18">Помощь в раздаче карточек позиций</option>
            <option value="20">Координация волонтёров</option>
            <option value="23">Составление отчёта</option>
            <option value="28">Пейсмейкер</option>
            <option value="30">Лидер для слабовидящих</option>
            <option value="31">Проведение разминки</option>
            <option value="32">Сурдопереводчик</option>
            <option value="33">Координатор парковки</option>
            <option value="34">Проверка трассы</option>
            <option value="35">Разметка трассы</option>
            <option value="36">Ведущий мероприятия</option>
            <option value="37">Проведение предстартового брифинга</option>
            <option value="38">Видеограф</option>
        </optgroup>
    </select>
    
    <button id="submit_btn" onclick="sendData()" disabled>Выберите человека из списка</button>
</div>

<div class="card">
    <h2>Кто уже в списке</h2>
    <table class="volunteer-list" id="queue_table">
        <tbody></tbody>
    </table>
</div>

<script>
    vkBridge.send("VKWebAppInit");

    // ПРОВЕРЬ, ЧТО ЭТОТ URL СОВПАДАЕТ С ТВОИМ ПОСЛЕДНИМ ДЕПЛОЕМ
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxJBVuR6wYJZCzWUYJ5S1V1p15Byh9IIji6XIp0i5XaPtYDQiLmkh0a76_VnsYq6p1a/exec';
    
    let selectedVolunteer = null;
    const searchInput = document.getElementById('verst_search');
    const resultsBox = document.getElementById('search_results');
    const submitBtn = document.getElementById('submit_btn');

    let debounceTimer;

    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        const query = e.target.value.trim();
        
        selectedVolunteer = null;
        submitBtn.disabled = true;
        submitBtn.innerText = "Выберите человека из списка";
        searchInput.style.borderColor = "#ddd";

        if (query.length < 3) {
            resultsBox.style.display = 'none';
            return;
        }

        debounceTimer = setTimeout(() => {
            fetchVolunteers(query);
        }, 500);
    });

    async function fetchVolunteers(query) {
        resultsBox.innerHTML = '<div class="loading-spinner">Ищем в базе 5 вёрст...</div>';
        resultsBox.style.display = 'block';

        try {
            const response = await fetch(`${SCRIPT_URL}?search=${encodeURIComponent(query)}`);
            const resData = await response.json();
            
            // Улучшенная логика извлечения данных
            let list = [];
            if (resData.result && resData.result.data) {
                list = resData.result.data;
            } else if (resData.data) {
                list = resData.data;
            }

            resultsBox.innerHTML = '';
            if (list.length > 0) {
                list.forEach(v => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<b>${v.full_name}</b><small>ID: ${v.id} • ${v.home_event || 'Парк не указан'}</small>`;
                    
                    div.onclick = () => {
                        selectedVolunteer = v;
                        searchInput.value = `${v.full_name} (ID: ${v.id})`;
                        resultsBox.style.display = 'none';
                        searchInput.style.borderColor = "#4bb34b";
                        submitBtn.disabled = false;
                        submitBtn.innerText = "Записаться";
                    };
                    resultsBox.appendChild(div);
                });
            } else {
                resultsBox.innerHTML = '<div class="loading-spinner">Никто не найден.</div>';
            }
        } catch (err) {
            resultsBox.innerHTML = '<div class="loading-spinner">Ошибка. Попробуйте еще раз.</div>';
        }
    }

    async function sendData() {
        const roleSelect = document.getElementById('role_id');
        if (!selectedVolunteer || !roleSelect.value) return;

        const payload = {
            verst_id: selectedVolunteer.id,
            role_id: roleSelect.value,
            role_name: roleSelect.options[roleSelect.selectedIndex].text,
            full_name: selectedVolunteer.full_name
        };

        try {
            submitBtn.innerText = "Записываем...";
            submitBtn.disabled = true;

            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            
            alert("Готово! Ты в списке.");
            location.reload();
        } catch(e) {
            alert("Ошибка записи.");
            submitBtn.disabled = false;
        }
    }

    async function loadQueue() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const tbody = document.querySelector('#queue_table tbody');
            tbody.innerHTML = "";
            if (Array.isArray(data)) {
                data.reverse().slice(0, 15).forEach(item => {
                    let row = tbody.insertRow();
                    row.insertCell(0).innerHTML = `<span class="role-tag">${item.role_name}</span>`;
                    row.insertCell(1).innerText = item.full_name;
                });
            }
        } catch(e) {}
    }

    loadQueue();
</script>
</body>
</html>
