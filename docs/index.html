<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волонтерство 5 вёрст Кстово</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, Helvetica Neue, Roboto, sans-serif; padding: 15px; background: #f5f5f5; color: #333; margin: 0; }
        .card { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { color: #2B326D; font-size: 18px; margin-top: 0; margin-bottom: 12px; border-bottom: 2px solid #f0f2ff; padding-bottom: 8px; }
        .date-badge { color: #E6564C; font-weight: bold; }
        
        label { font-size: 12px; color: #666; margin-left: 4px; font-weight: 600; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 16px 0; border: 1px solid #dce1e6; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; background-color: #f9fafb; }
        input:focus, select:focus { border-color: #2B326D; background-color: #fff; }
        
        button { width: 100%; padding: 14px; background: #E6564C; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
        button:disabled { background: #b0b0b0; cursor: not-allowed; opacity: 0.7; }
        
        #search_wrapper { position: relative; }
        #search_results { 
            background: white; 
            border: 1px solid #dce1e6; 
            border-radius: 8px; 
            max-height: 280px; 
            overflow-y: auto; 
            display: none; 
            position: absolute; 
            width: 100%; 
            z-index: 1000; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            top: 54px;
        }
        
        .search-item { padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s; }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: #f0f2ff; }
        .search-item b { display: block; color: #2B326D; font-size: 15px; }
        .search-item small { color: #666; font-size: 12px; display: block; margin-top: 2px; }

        .volunteer-list { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        .volunteer-list tr { border-bottom: 1px solid #f0f0f0; }
        .volunteer-list td { padding: 10px 4px; }
        .role-tag { background: #f0f2ff; color: #2B326D; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }
        .full-name-cell { font-weight: 500; padding-left: 8px !important; }

        .loading-spinner { padding: 20px; text-align: center; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Записаться на <span id="event_date" class="date-badge">...</span></h2>
    
    <label>Кто записывается:</label>
    <div id="search_wrapper">
        <input type="text" id="verst_search" placeholder="Введите фамилию или ID..." autocomplete="off">
        <div id="search_results"></div>
    </div>
    
    <label>Позиция волонтера:</label>
    <select id="role_id" onchange="validateForm()">
        <option value="" disabled selected>Выберите роль из списка</option>
        <optgroup label="Основные позиции">
            <option value="1">Организатор</option>
            <option value="2">Секундомер</option>
            <option value="5">Фотограф</option>
            <option value="7">Маршал</option>
            <option value="8">Подготовка мероприятия</option>
            <option value="11">Сканирование штрих-кодов</option>
            <option value="13">Раздача карточек позиций</option>
            <option value="19">Замыкающий</option>
        </optgroup>
        <optgroup label="Дополнительные позиции">
            <option value="3">Сортировка карточек</option>
            <option value="4">Обработка результатов</option>
            <option value="6">Связи с общественностью</option>
            <option value="9">Хранение и доставка оборудования</option>
            <option value="10">Разное</option>
            <option value="12">Завершение мероприятия</option>
            <option value="14">Проверка карточек позиций</option>
            <option value="15">Инструктаж новых участников</option>
            <option value="16">Организация финиша</option>
            <option value="17">Ведущий велосипед</option>
            <option value="18">Помощь в раздаче карточек позиций</option>
            <option value="20">Координация волонтёров</option>
            <option value="23">Составление отчёта</option>
            <option value="28">Пейсмейкер</option>
            <option value="30">Лидер для слабовидящих</option>
            <option value="31">Проведение разминки</option>
            <option value="32">Сурдопереводчик</option>
            <option value="33">Координатор парковки</option>
            <option value="34">Проверка трассы</option>
            <option value="35">Разметка трассы</option>
            <option value="36">Ведущий мероприятия</option>
            <option value="37">Проведение предстартового брифинга</option>
            <option value="38">Видеограф</option>
        </optgroup>
    </select>
    
    <button id="submit_btn" onclick="sendData()" disabled>Выберите человека</button>
</div>

<div class="card">
    <h2>Текущий список (Кстово)</h2>
    <table class="volunteer-list" id="queue_table">
        <tbody>
            <tr><td colspan="2" style="text-align:center; color:#999; padding:20px;">Загрузка списка...</td></tr>
        </tbody>
    </table>
</div>

<script>
    vkBridge.send("VKWebAppInit");

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztjmYHr6Z0Np12wj5ml2n4ZzCFrdbA81rgjXjXj4yQvubQmsgPpnxREjRoVS7i8Yw2QA/exec';
    
    let selectedVolunteer = null;
    let vkUser = null;

    // Инициализация: получаем данные пользователя ВК и дату с сервера
    async function init() {
        try {
            // Получаем инфо о том, кто открыл приложение
            vkUser = await vkBridge.send("VKWebAppGetUserInfo");
            
            // Получаем дату ближайшей субботы из Google Script
            const res = await fetch(SCRIPT_URL + "?get_date=1");
            const data = await res.json();
            document.getElementById('event_date').innerText = data.date;
        } catch (e) { 
            console.error("Ошибка инициализации", e); 
            document.getElementById('event_date').innerText = "ближайший старт";
        }
    }
    init();

    const searchInput = document.getElementById('verst_search');
    const resultsBox = document.getElementById('search_results');
    const submitBtn = document.getElementById('submit_btn');
    const roleSelect = document.getElementById('role_id');

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        if (query.length < 3) { 
            resultsBox.style.display = 'none'; 
            selectedVolunteer = null;
            validateForm();
            return; 
        }
        clearTimeout(window.searchTimeout);
        window.searchTimeout = setTimeout(() => fetchVolunteers(query), 500);
    });

    async function fetchVolunteers(query) {
        resultsBox.innerHTML = '<div class="loading-spinner">Поиск в базе NRMS...</div>';
        resultsBox.style.display = 'block';

        try {
            const response = await fetch(`${SCRIPT_URL}?search=${encodeURIComponent(query)}`);
            const resData = await response.json();
            const list = resData.result?.data || [];

            resultsBox.innerHTML = '';
            if (list.length > 0) {
                list.forEach(v => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `
                        <b>${v.full_name}</b>
                        <small>ID: ${v.id} • Парк: ${v.home_event || 'не указан'}</small>
                    `;
                    div.onclick = () => {
                        selectedVolunteer = v;
                        searchInput.value = v.full_name;
                        resultsBox.style.display = 'none';
                        validateForm();
                    };
                    resultsBox.appendChild(div);
                });
            } else {
                resultsBox.innerHTML = '<div class="loading-spinner">Ничего не найдено</div>';
            }
        } catch (e) {
            resultsBox.innerHTML = '<div class="loading-spinner" style="color:red;">Ошибка связи с базой</div>';
        }
    }

    function validateForm() {
        if (selectedVolunteer && roleSelect.value) {
            submitBtn.disabled = false;
            submitBtn.innerText = "Записаться волонтером";
        } else {
            submitBtn.disabled = true;
            submitBtn.innerText = selectedVolunteer ? "Выберите позицию" : "Выберите человека";
        }
    }

    async function sendData() {
        if (!selectedVolunteer || !roleSelect.value) return;

        submitBtn.innerText = "Записываем...";
        submitBtn.disabled = true;

        const payload = {
            verst_id: selectedVolunteer.id,
            role_id: roleSelect.value,
            role_name: roleSelect.options[roleSelect.selectedIndex].text,
            full_name: selectedVolunteer.full_name,
            vk_id: vkUser ? vkUser.id : "",
            vk_name: vkUser ? (vkUser.first_name + " " + vkUser.last_name) : ""
        };

        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(payload)
            });
            
            alert("Записано! Список в чате обновится через пару секунд.");
            location.reload(); 
        } catch (e) {
            alert("Произошла ошибка при отправке данных.");
            submitBtn.disabled = false;
            submitBtn.innerText = "Попробовать снова";
        }
    }

    async function loadQueue() {
        const tbody = document.querySelector('#queue_table tbody');
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#999; padding:20px;">Пока никто не записался</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            data.reverse().forEach(item => {
                let row = tbody.insertRow();
                row.insertCell(0).innerHTML = `<span class="role-tag">${item.role_name}</span>`;
                let nameCell = row.insertCell(1);
                nameCell.className = 'full-name-cell';
                nameCell.innerText = item.full_name;
            });
        } catch(e) {
            tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:red; padding:20px;">Ошибка загрузки списка</td></tr>';
        }
    }

    loadQueue();
</script>

</body>
</html>
