<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волонтерство 5 вёрст Кстово</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, Helvetica Neue, Roboto, sans-serif; padding: 0; background: #f5f5f5; color: #333; margin: 0; padding-bottom: 30px; }
        .tabs { display: flex; background: #2B326D; position: sticky; top: 0; z-index: 1000; padding: 5px; gap: 5px; }
        .tab { flex: 1; text-align: center; padding: 12px; font-weight: bold; color: #fff; opacity: 0.6; cursor: pointer; border-radius: 8px; font-size: 14px; }
        .tab.active { opacity: 1; background: rgba(255,255,255,0.15); }
        .card { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin: 15px; }
        h2 { color: #2B326D; font-size: 18px; margin-top: 0; margin-bottom: 12px; border-bottom: 2px solid #f0f2ff; padding-bottom: 8px; }
        .date-badge { color: #E6564C; font-weight: bold; }
        .welcome-msg { background: #f0f2ff; padding: 12px; border-radius: 10px; font-size: 13px; margin-bottom: 15px; color: #2B326D; display: none; border: 1px solid #dce1e6; line-height: 1.6; }
        
        .btn-qr { background: #2B326D; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-top: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; box-sizing: border-box; }
        
        label { font-size: 11px; color: #999; margin-left: 4px; font-weight: 600; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #dce1e6; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; background: #f9fafb; }
        button#submit_btn { width: 100%; padding: 14px; background: #E6564C; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #b0b0b0; }

        /* Таблица "В списке" - исправленная */
        .volunteer-list { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 5px; }
        .volunteer-list tr { background: #fcfdfe; }
        .volunteer-list td { padding: 12px 10px; border-top: 1px solid #f0f2f5; border-bottom: 1px solid #f0f2f5; }
        .volunteer-list td:first-child { border-left: 1px solid #f0f2f5; border-radius: 10px 0 0 10px; }
        .volunteer-list td:last-child { border-right: 1px solid #f0f2f5; border-radius: 0 10px 10px 0; text-align: right; }
        .role-tag { background: #f0f2ff; color: #2B326D; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }

        /* Модальное окно QR */
        #qr_modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; color: white; padding: 20px; box-sizing: border-box; }
        .qr-container { background: white; padding: 25px; border-radius: 24px; text-align: center; width: 100%; max-width: 300px; }
        .qr-container img { width: 100%; height: auto; border-radius: 10px; }
        .qr-container h3 { color: #2B326D; margin: 15px 0 5px 0; font-size: 20px; }
        .qr-container p { color: #E6564C; margin: 0; font-weight: 900; font-size: 24px; }
        .close-qr { margin-top: 30px; background: rgba(255,255,255,0.2); color: white; padding: 12px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); }

        /* Рейтинг */
        .rating-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .rank { width: 30px; font-weight: 900; color: #2B326D; font-size: 16px; }
        .user-info { flex: 1; padding-left: 5px; }
        .user-name { font-weight: 700; font-size: 15px; color: #2B326D; display: block; }
        .stats-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 800; text-transform: uppercase; white-space: nowrap; color: #fff; display: flex; align-items: center; gap: 4px; }
        
        .run10 { background: #fecc3f; color: #333; } .run25 { background: #f29104; } .run50 { background: #e6464c; } .run100, .run250, .run500 { background: #8c1f28; }
        .vol10 { background: #c9b4d8; color: #333; } .vol25 { background: #9d82aa; } .vol50 { background: #6c5391; } .vol100, .vol250, .vol500 { background: #422d58; }
        .badge img { width: 12px; height: 12px; filter: brightness(0) saturate(100%) invert(100%); }
        .run10 img, .vol10 img { filter: brightness(0) saturate(100%); }
    </style>
</head>
<body>

<div id="qr_modal" onclick="closeQR()">
    <div class="qr-container" onclick="event.stopPropagation()">
        <h3>Карточка 5 вёрст</h3>
        <div id="qr_img_box"></div>
        <p id="qr_id_text"></p>
        <span id="qr_name_text" style="color:#666; font-size:14px; display:block; margin-top:5px; font-weight:500;"></span>
    </div>
    <div class="close-qr">Закрыть</div>
</div>

<div class="tabs">
    <div id="tab_rec" class="tab active" onclick="switchTab('rec')">ЗАПИСЬ</div>
    <div id="tab_rate" class="tab" onclick="switchTab('rate')">РЕЙТИНГ</div>
</div>

<div id="section_rec">
    <div class="card">
        <h2>Записаться на <span id="event_date" class="date-badge">...</span></h2>
        <div id="welcome_back" class="welcome-msg"></div>
        
        <label>Кто записывается:</label>
        <div style="position:relative">
            <input type="text" id="verst_search" placeholder="Введите фамилию или ID..." autocomplete="off">
            <div id="search_results" style="background: white; border: 1px solid #dce1e6; border-radius: 8px; max-height: 250px; overflow-y: auto; display: none; position: absolute; width: 100%; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.1); top: 52px;"></div>
        </div>
        
        <label>Позиция волонтера:</label>
        <select id="role_id" onchange="validateForm()">
            <option value="" disabled selected>Выберите роль из списка</option>
            <optgroup label="Основные позиции">
                <option value="1">Организатор</option>
                <option value="2">Секундомер</option>
                <option value="5">Фотограф</option>
                <option value="7">Маршал</option>
                <option value="8">Подготовка мероприятия</option>
                <option value="11">Сканирование штрих-кодов</option>
                <option value="13">Раздача карточек позиций</option>
                <option value="19">Замыкающий</option>
            </optgroup>
            <optgroup label="Дополнительные позиции">
                <option value="3">Сортировка карточек</option>
                <option value="4">Обработка результатов</option>
                <option value="6">Связи с общественностью</option>
                <option value="9">Хранение и доставка оборудования</option>
                <option value="10">Разное</option>
                <option value="12">Завершение мероприятия</option>
                <option value="14">Проверка карточек позиций</option>
                <option value="15">Инструктаж новых участников</option>
                <option value="16">Организация финиша</option>
                <option value="17">Ведущий велосипед</option>
                <option value="18">Помощь в раздаче карточек позиций</option>
                <option value="20">Координация волонтёров</option>
                <option value="23">Составление отчёта</option>
                <option value="28">Пейсмейкер</option>
                <option value="30">Лидер для слабовидящих</option>
                <option value="31">Проведение разминки</option>
                <option value="32">Сурдопереводчик</option>
                <option value="33">Координатор парковки</option>
                <option value="34">Проверка трассы</option>
                <option value="35">Разметка трассы</option>
                <option value="36">Ведущий мероприятия</option>
                <option value="37">Проведение предстартового брифинга</option>
                <option value="38">Видеограф</option>
            </optgroup>
        </select>
        <button id="submit_btn" onclick="sendData()" disabled>Выберите человека</button>
    </div>
    <div class="card">
        <h2>В списке на субботу</h2>
        <table class="volunteer-list" id="queue_table"><tbody></tbody></table>
    </div>
</div>

<div id="section_rate" style="display:none">
    <div class="card">
        <h2>Поиск участника в рейтинге</h2>
        <label>Найди себя, чтобы сохранить карточку:</label>
        <div style="position:relative">
            <input type="text" id="rate_search" placeholder="Фамилия или ID..." autocomplete="off">
            <div id="rate_results" style="background: white; border: 1px solid #dce1e6; border-radius: 8px; max-height: 200px; overflow-y: auto; display: none; position: absolute; width: 100%; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.1); top: 52px;"></div>
        </div>
    </div>
    <div class="card">
        <h2>Топ участников Кстово</h2>
        <div id="rating_list">Загрузка рейтинга...</div>
    </div>
</div>

<script>
    vkBridge.send("VKWebAppInit");
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzIdBU086wICjk08FRvz5x68WXwNQ_Bt7n16kD7nsdJ4Mv8EnzEz0oh7N0dKUCuPWzSeQ/exec';
    
    let selectedVolunteer = null;
    let vkUser = null;

    const runIcon = `<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M13.49 5.42c1.23 0 2.22-1 2.22-2.22A2.22 2.22 0 0 0 13.5 1a2.22 2.22 0 0 0-2.23 2.22c0 1.22.99 2.2 2.22 2.2M10.34 11l-2.1-1.03c-.34-.17-.55-.52-.55-.91 0-.74.79-1.22 1.45-.91l4.83 2.3c.53.25.87.78.87 1.37V17h-2v-4.43l-1.74-.83V23h-2v-6.95l.45-1.5L7.2 13c-.34-.16-.55-.52-.55-.9 0-.75.8-1.23 1.46-.9l2.23 1.03V11z'/%3E%3C/svg%3E" />`;
    const volIcon = "🧡 ";

    function switchTab(t) {
        document.getElementById('section_rec').style.display = t === 'rec' ? 'block' : 'none';
        document.getElementById('section_rate').style.display = t === 'rate' ? 'block' : 'none';
        document.getElementById('tab_rec').classList.toggle('active', t === 'rec');
        document.getElementById('tab_rate').classList.toggle('active', t === 'rate');
        if (t === 'rate') loadRating();
    }

    function showQR(id, name) {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=A${id}`;
        document.getElementById('qr_img_box').innerHTML = `<img src="${qrUrl}" alt="QR">`;
        document.getElementById('qr_id_text').innerText = `A${id}`;
        document.getElementById('qr_name_text').innerText = name.toUpperCase();
        document.getElementById('qr_modal').style.display = 'flex';
    }

    function closeQR() { document.getElementById('qr_modal').style.display = 'none'; }

    async function init() {
        try {
            vkUser = await vkBridge.send("VKWebAppGetUserInfo");
            const res = await fetch(`${SCRIPT_URL}?check_vk_id=${vkUser.id}`);
            const data = await res.json();
            
            if (data.found) {
                selectedVolunteer = { id: data.verst_id, full_name: data.full_name };
                document.getElementById('verst_search').value = data.full_name;
                const welcome = document.getElementById('welcome_back');
                welcome.style.display = 'block';
                
                let badgesHtml = "";
                if (data.stats) {
                    const rB = data.stats.run_club ? `<span class="badge ${data.stats.run_club}">${runIcon} ${data.stats.run_club.replace('run','')}</span>` : '';
                    const vB = data.stats.vol_club ? `<span class="badge ${data.stats.vol_club}">${volIcon} ${data.stats.vol_club.replace('vol','')}</span>` : '';
                    if (rB || vB) badgesHtml = `<div class="stats-row" style="margin: 8px 0;">${rB} ${vB}</div>`;
                }

                welcome.innerHTML = `
                    👋 <b>${vkUser.first_name}</b>, твои данные подставлены!
                    ${badgesHtml}
                    <button class="btn-qr" onclick="showQR('${data.verst_id}', '${data.full_name}')">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 3v8h8V3h-8zm6 6h-4V5h4v4zm-6 12h2v-2h-2v2zm2-2h2v-2h-2v2zm-2-2h2v-2h-2v2zm4 4h2v-2h-2v2zm2-2h2v-2h-2v2zm-4-4h2v-2h-2v2zm4 4h2v-2h-2v2z'/%3E%3C/svg%3E" width="16" />
                        МОЯ КАРТОЧКА УЧАСТНИКА
                    </button>`;
                validateForm();
            }

            const dRes = await fetch(SCRIPT_URL + "?get_date=1");
            const dData = await dRes.json();
            document.getElementById('event_date').innerText = dData.date;
        } catch (e) { console.error(e); }
    }
    init();

    // Общая функция поиска
    async function searchHandler(query, resultBox, isRecord) {
        if (query.length < 3) { resultBox.style.display = 'none'; return; }
        resultBox.innerHTML = '<div style="padding:15px">Поиск...</div>';
        resultBox.style.display = 'block';
        try {
            const res = await fetch(`${SCRIPT_URL}?search=${encodeURIComponent(query)}`);
            const data = await res.json();
            resultBox.innerHTML = '';
            (data.result?.data || []).forEach(v => {
                const div = document.createElement('div');
                div.style.padding = '12px';
                div.style.borderBottom = '1px solid #f0f0f0';
                div.style.cursor = 'pointer';
                div.innerHTML = `<b>${v.full_name}</b><br><small>ID: ${v.id}</small>`;
                div.onclick = async () => {
                    if (isRecord) {
                        selectedVolunteer = v;
                        document.getElementById('verst_search').value = v.full_name;
                        resultBox.style.display = 'none';
                        document.getElementById('welcome_back').style.display = 'none';
                        validateForm();
                    } else {
                        // Регистрация в рейтинге без волонтерства
                        resultBox.innerHTML = '<div style="padding:15px">Сохраняем...</div>';
                        const payload = { action: "sync_only", vk_id: vkUser.id, verst_id: v.id, full_name: v.full_name };
                        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        alert("Профиль сохранен!"); location.reload();
                    }
                };
                resultBox.appendChild(div);
            });
        } catch (e) { resultBox.innerHTML = 'Ошибка'; }
    }

    document.getElementById('verst_search').addEventListener('input', (e) => {
        clearTimeout(window.searchTimeout);
        window.searchTimeout = setTimeout(() => searchHandler(e.target.value.trim(), document.getElementById('search_results'), true), 500);
    });

    document.getElementById('rate_search').addEventListener('input', (e) => {
        clearTimeout(window.rateTimeout);
        window.rateTimeout = setTimeout(() => searchHandler(e.target.value.trim(), document.getElementById('rate_results'), false), 500);
    });

    function validateForm() {
        const btn = document.getElementById('submit_btn');
        const role = document.getElementById('role_id');
        btn.disabled = !(selectedVolunteer && role.value);
        btn.innerText = selectedVolunteer ? (role.value ? "Записаться волонтером" : "Выберите позицию") : "Выберите человека";
    }

    async function sendData() {
        const btn = document.getElementById('submit_btn');
        btn.innerText = "Записываем..."; btn.disabled = true;
        const payload = {
            verst_id: selectedVolunteer.id,
            role_id: document.getElementById('role_id').value,
            role_name: document.getElementById('role_id').options[document.getElementById('role_id').selectedIndex].text,
            full_name: selectedVolunteer.full_name,
            vk_id: vkUser.id,
            vk_name: vkUser.first_name + " " + vkUser.last_name
        };
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Записано!"); location.reload();
    }

    async function loadRating() {
        const container = document.getElementById('rating_list');
        container.innerHTML = 'Загрузка рейтинга...';
        try {
            const res = await fetch(`${SCRIPT_URL}?get_rating=1`);
            const data = await res.json();
            data.sort((a,b) => ((b.runs||0) + (b.vols||0)) - ((a.runs||0) + (a.vols||0)));
            container.innerHTML = '';
            data.forEach((u, i) => {
                const item = document.createElement('div');
                item.className = 'rating-item';
                const rBadge = u.run_club ? `<span class="badge ${u.run_club}">${runIcon} ${u.run_club.replace('run','')}</span>` : '';
                const vBadge = u.vol_club ? `<span class="badge ${u.vol_club}">${volIcon} ${u.vol_club.replace('vol','')}</span>` : '';
                item.innerHTML = `<div class="rank">${i+1}</div><div class="user-info"><span class="user-name">${u.name}</span><div class="stats-row">${rBadge} ${vBadge}</div></div>`;
                container.appendChild(item);
            });
        } catch (e) { container.innerHTML = 'Ошибка загрузки'; }
    }

    async function loadQueue() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const tbody = document.querySelector('#queue_table tbody');
            data.reverse().forEach(item => {
                let row = tbody.insertRow();
                row.insertCell(0).innerHTML = `<span class="role-tag">${item.role_name}</span>`;
                let nc = row.insertCell(1); nc.className = 'full-name-cell'; nc.innerText = item.full_name;
            });
        } catch(e) {}
    }
    loadQueue();
</script>
</body>
</html>
